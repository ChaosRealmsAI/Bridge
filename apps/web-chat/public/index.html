<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Pandart Local Chat</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">PT</div>
        <div class="brand-copy">
          <span class="eyebrow" data-domain-badge>pandart.cc</span>
          <h1>Pandart</h1>
          <p>本机 Codex 对话台</p>
        </div>
      </div>

      <section class="panel status-panel">
        <div class="row">
          <span>Pandart 账号</span>
          <strong data-session-status>检查中</strong>
        </div>
        <div class="row">
          <span>本机连接</span>
          <strong data-device-status>未连接</strong>
        </div>
        <div class="row">
          <span>就绪状态</span>
          <strong data-readiness-status>检查中</strong>
        </div>
        <div class="row">
          <span>API</span>
          <strong data-api-base>local</strong>
        </div>
      </section>

      <section class="panel login" data-login-panel>
        <form data-login-form>
          <label class="label" for="login-email">邮箱</label>
          <input id="login-email" data-login-email type="email" autocomplete="email" placeholder="chaos@pandart.cc">
          <label class="label" for="login-password">密码</label>
          <input id="login-password" data-login-password type="password" autocomplete="current-password" placeholder="输入密码">
          <button type="submit" class="primary">登录 / 创建测试账号</button>
        </form>
      </section>

      <div class="actions account-actions" aria-label="Pandart account actions">
        <button data-action="login">登录账号</button>
        <button data-action="logout">退出账号</button>
        <button data-action="refresh">刷新</button>
        <button data-action="mobile">手机同步</button>
      </div>

      <section class="panel bridge-panel" data-bridge-panel data-bridge-state="loading">
        <div class="bridge-head">
          <div>
            <span class="label">Codex 电脑</span>
            <h2 data-bridge-title>检查中</h2>
          </div>
          <span class="state-dot" data-bridge-dot></span>
        </div>
        <p class="bridge-copy" data-bridge-copy>正在读取 Bridge 状态。</p>
        <div class="bridge-primary" data-bridge-primary></div>
        <div class="bridge-download" data-bridge-download hidden></div>
        <div class="bridge-device-list" data-bridge-devices></div>
        <details class="bridge-menu" data-bridge-menu hidden>
          <summary>次要操作</summary>
          <div class="bridge-menu-actions" data-bridge-menu-actions></div>
        </details>
      </section>

      <section class="panel mobile" data-mobile hidden>
        <h2>手机同步链接</h2>
        <p>手机打开后，会进入同一个 Pandart 账号。</p>
        <a class="install-link" href="/" data-mobile-link>打开手机链接</a>
      </section>
    </aside>

    <section class="chat">
      <header class="chat-head">
        <div>
          <span class="route-label">local / mobile / pandart.cc</span>
          <h2>Local Chat</h2>
          <p>打开本地地址，连接这台电脑，把消息交给本机 Codex。</p>
        </div>
        <div class="runtime-stack">
          <span class="pill" data-runtime-pill>local bridge</span>
          <span class="origin" data-public-origin>localhost</span>
        </div>
      </header>

      <div class="messages" data-messages>
        <article class="message assistant">
          <div class="avatar">PT</div>
          <div class="bubble">
            <div class="bubble-text">登录 Pandart 账号并连接本机后，就可以开始和本地 Codex 对话。</div>
          </div>
        </article>
      </div>

      <form class="composer" data-composer>
        <textarea data-input rows="1" placeholder="问本机 Codex 一件事..."></textarea>
        <button type="button" class="cancel" data-cancel hidden>停止</button>
        <button type="submit" class="send" data-send>发送</button>
      </form>
    </section>
  </main>
  <script type="module" src="/main.js"></script>
</body>
</html>
