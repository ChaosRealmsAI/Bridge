<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=https://syllo.test.example/authorize?source=bridge&product=panda-syllo">
  <title>Open Syllo Authorization</title>
  <style>
    :root { color-scheme: dark; font-family: "Aptos", "IBM Plex Sans", sans-serif; background: #090b0c; color: #f1f4ef; }
    body { min-height: 100dvh; margin: 0; display: grid; place-items: center; background: linear-gradient(180deg, rgba(73, 198, 177, .12), transparent 260px), #090b0c; }
    main { width: min(520px, calc(100vw - 32px)); border: 1px solid #273236; padding: 24px; background: #10171a; }
    p { color: #9aa8a3; line-height: 1.5; }
    a { color: #d4a34f; font-weight: 800; }
  </style>
</head>
<body>
  <main>
    <h1>正在打开 Syllo 授权页</h1>
    <p>Bridge 只负责启动授权和后续连接；账号注册、登录和授权说明在 Syllo Web 完成。</p>
    <p><a href="https://syllo.test.example/authorize?source=bridge&product=panda-syllo">打开 Syllo Web Authorization</a></p>
  </main>
</body>
</html>
