<!doctype html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panda Bridge</title>
<style>
:root{
  --mono:ui-monospace,"SF Mono",Menlo,monospace;
  --ease:cubic-bezier(.22,.61,.36,1);--dur:170ms;
  --brand-a:#2f7bff;--brand-b:#6a5cff;
  --ok:#30b14f;--warn:#cf7a00;--danger:#e0382f;--retry:#2f7bff;
}
[data-theme="light"]{
  --desk1:#d6d9e0;--desk2:#c2c6d3;
  --win:#f5f5f7;--surface:#fff;--surface-2:#ededf0;
  --ink:#1a1a21;--ink-2:#52525b;--ink-3:#8b8b94;
  --line:rgba(20,20,40,.10);--line-soft:rgba(20,20,40,.06);
  --sel:rgba(47,99,255,.10);--accent:#2563eb;
  --danger-bg:#fcebe9;--warn-bg:#faf1df;
  --win-shadow:0 30px 90px rgba(15,18,40,.36),0 4px 18px rgba(15,18,40,.15);
  --card-shadow:0 1px 2px rgba(15,18,40,.05);
  --sheet-shadow:0 18px 50px rgba(10,12,35,.32);
}
[data-theme="dark"]{
  --desk1:#26262e;--desk2:#15151b;
  --win:#1d1d22;--surface:#28282e;--surface-2:#222227;
  --ink:#f2f2f5;--ink-2:#b8b8c2;--ink-3:#83838e;
  --line:rgba(255,255,255,.10);--line-soft:rgba(255,255,255,.06);
  --sel:rgba(86,130,255,.18);--accent:#6f9bff;
  --danger-bg:rgba(224,56,47,.16);--warn-bg:rgba(207,122,0,.16);
  --win-shadow:0 30px 90px rgba(0,0,0,.62),0 4px 18px rgba(0,0,0,.4);
  --card-shadow:0 1px 2px rgba(0,0,0,.35);
  --sheet-shadow:0 18px 50px rgba(0,0,0,.55);
}
*{box-sizing:border-box;margin:0;padding:0}
button,select{font:inherit;color:inherit}
button{background:none;border:0;cursor:pointer}
html,body{height:100%}
body{
  font:13px/1.45 -apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Hiragino Sans GB",sans-serif;
  color:var(--ink);-webkit-font-smoothing:antialiased;overflow:hidden;
  background:radial-gradient(900px 600px at 30% 8%,var(--desk1),var(--desk2));
  display:grid;place-items:center;
}
.win{
  position:relative;width:760px;height:500px;border-radius:13px;overflow:hidden;
  background:var(--win);box-shadow:var(--win-shadow);
  display:grid;grid-template-columns:188px 1fr;border:1px solid rgba(255,255,255,.15);
}
.rail{border-right:1px solid var(--line-soft);background:var(--surface-2);display:flex;flex-direction:column;padding:12px 8px 10px}
.lights{display:flex;gap:7px;padding:2px 6px 14px}
.lights i{width:12px;height:12px;border-radius:50%}
.lights i:nth-child(1){background:#ff5f57}.lights i:nth-child(2){background:#febc2e}.lights i:nth-child(3){background:#28c840}
.brand{display:flex;align-items:center;gap:8px;padding:0 8px 14px}
.logo{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;color:#fff;background:linear-gradient(150deg,#3a3a44,#17171d);box-shadow:inset 0 1px 0 rgba(255,255,255,.18),0 1px 3px rgba(0,0,0,.25);flex:none}
.brand b{font-size:13px;font-weight:650}
.lab{font-size:10.5px;font-weight:600;color:var(--ink-3);padding:0 8px 6px;letter-spacing:.02em}
.ptab{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:8px;text-align:left;transition:background var(--dur) var(--ease);width:100%;animation:enter .24s var(--ease)}
.ptab:hover{background:var(--line-soft)}
.ptab[aria-current="true"]{background:var(--surface);box-shadow:var(--card-shadow),0 0 0 1px var(--line-soft)}
.pico{width:28px;height:28px;border-radius:7px;flex:none;display:grid;place-items:center;color:#fff;font-size:10.5px;font-weight:700;box-shadow:inset 0 1px 0 rgba(255,255,255,.3),0 1px 3px rgba(0,0,0,.15)}
.pt-main{min-width:0}
.pn{font-size:12.5px;font-weight:550;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pm{font-size:10px;color:var(--ink-3)}
.dot{width:7px;height:7px;border-radius:50%;flex:none}
.ptab .dot{margin-left:auto}
.dot.ok{background:var(--ok);box-shadow:0 0 6px rgba(48,177,79,.55)}
.dot.off{background:var(--ink-3);opacity:.65}
.dot.warn{background:var(--warn)}
.dot.retry{background:var(--retry);animation:pulse 1.2s ease-in-out infinite}
.spacer{flex:1}
.pane{min-width:0;display:flex;flex-direction:column;padding:14px 16px;overflow-y:auto;position:relative}
.phead{display:flex;align-items:center;gap:11px;padding:0 2px 12px;flex:none}
.phead .nm{font-size:15.5px;font-weight:650;letter-spacing:-.015em}
.phead .org{font-family:var(--mono);font-size:11px;color:var(--ink-3);margin-top:1px}
.phead .end{margin-left:auto;display:flex;gap:6px;align-items:center}
.btn{padding:5px 13px;border-radius:7px;border:1px solid var(--line);background:var(--surface);font-size:12px;box-shadow:var(--card-shadow);transition:filter var(--dur) var(--ease),background var(--dur) var(--ease)}
.btn:hover{filter:brightness(.97)}
.btn.primary{border:0;color:#fff;font-weight:500;background:linear-gradient(160deg,var(--brand-a),var(--brand-b));box-shadow:0 2px 8px rgba(63,94,255,.35),inset 0 1px 0 rgba(255,255,255,.25)}
.btn.mini{padding:3.5px 10px;font-size:11px;border-radius:6px}
.btn.dangerfill{border:0;color:#fff;font-weight:500;background:linear-gradient(160deg,#ff6c5f,#e0382f);box-shadow:0 2px 8px rgba(224,56,47,.3)}
.acct{display:flex;align-items:center;gap:11px;padding:11px 13px;min-height:56px;background:var(--surface);border:1px solid var(--line-soft);border-radius:11px;box-shadow:var(--card-shadow);margin-bottom:8px;animation:enter .28s var(--ease);transition:background var(--dur) var(--ease),opacity var(--dur) var(--ease),transform var(--dur) var(--ease)}
.acct:hover{background:color-mix(in srgb,var(--surface) 92%,var(--accent) 8%)}
[data-theme="dark"] .acct:hover{background:color-mix(in srgb,var(--surface) 90%,#fff 4%)}
.acct.leaving{opacity:0;transform:translateY(-4px)}
.who{flex:1;min-width:0;margin-right:8px}
.em{font-size:13px;font-weight:550;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.swg{display:flex;align-items:center;gap:14px;flex:none;margin-left:auto}
.swi{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink-2);white-space:nowrap}
.swi.dis{opacity:.42}
.switch{width:32px;height:19px;border-radius:99px;background:var(--line);position:relative;transition:background var(--dur) var(--ease),opacity var(--dur) var(--ease);flex:none;vertical-align:middle}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:left var(--dur) var(--ease)}
.switch[aria-checked="true"]{background:var(--ok)}
.switch[aria-checked="true"]::after{left:15px}
.switch.retry{background:rgba(47,123,255,.55);animation:pulse 1.2s ease-in-out infinite}
.switch[disabled],.switch[aria-disabled="true"]{cursor:default}
.del{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;color:var(--ink-3);flex:none;margin-left:6px}
.del:hover{background:var(--danger-bg);color:var(--danger)}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding-bottom:14px}
.empty h2{font-size:18px;font-weight:700;letter-spacing:-.02em}
.sub{font-size:12.5px;color:var(--ink-3);margin:5px 0 22px}
.hint{font-size:11.5px;color:var(--ink-3);margin-top:14px}
.rows{background:var(--surface);border:1px solid var(--line-soft);border-radius:12px;box-shadow:var(--card-shadow)}
.rows>*{display:flex;align-items:center;gap:10px;padding:9px 13px;min-height:43px}
.rows>*+*{border-top:1px solid var(--line-soft)}
.rows .t{font-size:12.5px;font-weight:500}
.rows .d{font-size:10.5px;color:var(--ink-3)}
.rows .end{margin-left:auto;display:flex;align-items:center;gap:8px;flex:none}
.rico{width:26px;height:26px;border-radius:6.5px;flex:none;display:grid;place-items:center;color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.25);font-size:13px}
.n-blue{background:linear-gradient(165deg,#4d96ff,#2563eb)}
.n-purple{background:linear-gradient(165deg,#9d7bff,#6d4fe0)}
.n-orange{background:linear-gradient(165deg,#ffab47,#f07b16)}
.n-gray{background:linear-gradient(165deg,#9aa0ad,#6b7280)}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;background:var(--surface)}
.seg button{padding:2.5px 10px;font-size:11px;color:var(--ink-2)}
.seg button+button{border-left:1px solid var(--line-soft)}
.seg button[aria-current="true"]{background:var(--sel);color:var(--accent);font-weight:500}
.select{border:1px solid var(--line);border-radius:7px;background:var(--surface);font-size:11.5px;padding:4px 24px 4px 9px}
.mono{font-family:var(--mono);font-size:11.5px;color:var(--ink-3)}
#modalRoot{display:contents}
.sheetwrap{position:absolute;inset:0;z-index:8;display:none;background:rgba(12,13,26,.30);backdrop-filter:blur(4px)}
.sheetwrap.on{display:block}
.sheet{position:absolute;top:50%;left:50%;transform:translate(-50%,-46%) scale(.96);opacity:0;width:360px;background:var(--win);border-radius:14px;box-shadow:var(--sheet-shadow);border:1px solid var(--line-soft);transition:all .22s var(--ease)}
.sheetwrap.on .sheet{transform:translate(-50%,-50%) scale(1);opacity:1}
.dsrc{display:flex;flex-direction:column;align-items:center;gap:7px;padding:26px 24px 4px;text-align:center}
.dsrc h3{font-size:16px;font-weight:700;letter-spacing:-.02em}
.dsrc .org{font-family:var(--mono);font-size:11.5px;color:var(--ink-3)}
.dacct{text-align:center;font-size:12.5px;font-weight:550;color:var(--ink-2);padding:6px 24px 2px;overflow-wrap:anywhere}
.dfoot{display:flex;gap:8px;padding:14px 18px 16px}
.dfoot .btn{flex:1;padding:7.5px;font-size:13px;text-align:center;border-radius:8px}
.pop{position:fixed;z-index:20;min-width:190px;background:var(--surface);border:1px solid var(--line);border-radius:11px;box-shadow:0 14px 44px rgba(10,12,35,.28),0 2px 8px rgba(10,12,35,.12);padding:5px;animation:popin .14s var(--ease)}
[data-theme="dark"] .pop{box-shadow:0 14px 44px rgba(0,0,0,.55),0 2px 8px rgba(0,0,0,.35)}
.pop .cf-t{font-size:13px;font-weight:600;padding:8px 10px 2px}
.pop .cf-d{font-size:11.5px;color:var(--ink-3);padding:0 10px 8px;line-height:1.5}
.pop .cf-row{display:flex;gap:6px;padding:2px 6px 4px}
.pop .cf-row .btn{flex:1;text-align:center;padding:5.5px;font-size:12px;border-radius:7px}
.toast{position:absolute;left:50%;bottom:14px;transform:translate(-50%,16px);opacity:0;z-index:9;display:flex;align-items:center;gap:7px;padding:7px 15px;border-radius:99px;font-size:12px;font-weight:500;background:rgba(26,28,38,.92);color:#fff;box-shadow:0 8px 26px rgba(0,0,0,.35);transition:all .26s var(--ease);pointer-events:none}
.toast.on{transform:translate(-50%,0);opacity:1}
.netbar{display:flex;align-items:center;gap:7px;margin:0 0 10px;padding:7px 12px;border-radius:9px;background:var(--warn-bg);color:var(--warn);font-size:11.5px;font-weight:500;animation:enter .26s var(--ease)}
.dot.pulse{animation:pulse 1.2s ease-in-out infinite}
.waiting{display:flex;align-items:center;gap:7px;margin-top:24px;font-size:11.5px;color:var(--ink-3)}
/* 在 wry 真窗口内运行（存在 window.ipc）：原生标题栏自带红绿灯，窗体即视口，去掉假桌面/假窗框 */
html.app body{background:var(--win);display:block}
html.app .win{width:100%;height:100%;border-radius:0;box-shadow:none;border:0}
html.app .lights{display:none}
@keyframes enter{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes popin{from{opacity:0;transform:translateY(-3px) scale(.98)}to{opacity:1;transform:none}}
@keyframes pulse{50%{opacity:.35}}
@media (prefers-reduced-motion:reduce){.dot.retry,.switch.retry{animation:none}}
</style>
</head>
<body>
<div class="win">
  <aside class="rail">
    <div class="lights"><i></i><i></i><i></i></div>
    <div class="brand">
      <div class="logo"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M4 15a4 4 0 0 1 4-4h8a4 4 0 0 1 4 4"/><circle cx="6.2" cy="17.6" r="2.2"/><circle cx="17.8" cy="17.6" r="2.2"/><path d="M12 11V5.5"/><circle cx="12" cy="4.4" r="1.3"/></svg></div>
      <b>Panda Bridge</b>
    </div>
    <div class="lab" id="productLabel">产品</div>
    <div id="railTabs"></div>
    <div class="spacer"></div>
    <button class="ptab" id="settingsTab" onclick="pickSettings()">
      <span class="pico n-gray"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.2 12a7.2 7.2 0 0 0-.1-1.2l2-1.5-2-3.4-2.3 1a7.2 7.2 0 0 0-2.1-1.2L14.3 3h-4l-.4 2.7a7.2 7.2 0 0 0-2.1 1.2l-2.3-1-2 3.4 2 1.5a7.3 7.3 0 0 0 0 2.4l-2 1.5 2 3.4 2.3-1a7.2 7.2 0 0 0 2.1 1.2l.4 2.7h4l.4-2.7a7.2 7.2 0 0 0 2.1-1.2l2.3 1 2-3.4-2-1.5c.07-.4.1-.8.1-1.2z"/></svg></span>
      <span class="pt-main"><span class="pn" id="settingsLabel">设置</span></span>
    </button>
  </aside>
  <main class="pane" id="pane"></main>
  <div id="modalRoot"></div>
  <div class="toast" id="toast"><i class="dot ok"></i><span id="toastTxt"></span></div>
</div>
<script>
const DEFAULT_API="https://api.bridge.otherline.cc";
if(window.ipc)document.documentElement.classList.add("app");
const BASE_PRODUCTS=[
  {id:"pandart",name:"Pandart",origin:"pandart.cc",web_url:"https://pandart.cc",initials:"PT",color:"linear-gradient(150deg,#34c3c8,#0c8c98)",accounts:[],connected:false,connection:"offline"},
  {id:"otherline",name:"Otherline",origin:"otherline.cc",web_url:"https://otherline.cc",initials:"OT",color:"linear-gradient(150deg,#7c74ff,#5040d9)",accounts:[],connected:false,connection:"offline"}
];
const LANG_OPTIONS=[
  ["auto","跟随系统"],["zh-CN","简体中文"],["zh-TW","繁體中文"],["en","English"],["ja","日本語"]
];
const TEXT={
  "zh-CN":{products:"产品",settings:"设置",notConnected:"未连接",accounts:"{n} 个账号",open:"打开",auth:"授权",conn:"连接",delete:"删除",cancel:"取消",confirmDelete:"删除 {name}？",deleteDesc:"该账号将无法再使用这台 Mac 的 AI。",useOnMac:"在这台 Mac 上使用 {name}",emptySub:"授权后，{name} 就能调用本机的 AI",emptyHint:"登录后点「连接本机」，回到这里确认即可",waiting:"已就绪，等待连接请求…",netbar:"网络中断，自动重连中 — 恢复后任务自动继续，无需操作",launch:"开机时启动",appearance:"外观",system:"跟随系统",light:"浅色",dark:"深色",language:"语言",cloud:"云端地址",deny:"拒绝",allow:"允许",wants:"{name} 想连接这台 Mac",opened:"已打开网页",paused:"已暂停授权",resumed:"已恢复授权",removed:"已删除",failed:"操作失败"},
  "zh-TW":{products:"產品",settings:"設定",notConnected:"未連接",accounts:"{n} 個帳號",open:"開啟",auth:"授權",conn:"連接",delete:"刪除",cancel:"取消",confirmDelete:"刪除 {name}？",deleteDesc:"該帳號將無法再使用這台 Mac 的 AI。",useOnMac:"在這台 Mac 上使用 {name}",emptySub:"授權後，{name} 就能呼叫本機的 AI",emptyHint:"登入後點「連接本機」，回到這裡確認即可",waiting:"已就緒，等待連接請求…",netbar:"網路中斷，自動重連中 — 恢復後任務自動繼續，無需操作",launch:"開機時啟動",appearance:"外觀",system:"跟隨系統",light:"淺色",dark:"深色",language:"語言",cloud:"雲端地址",deny:"拒絕",allow:"允許",wants:"{name} 想連接這台 Mac",opened:"已開啟網頁",paused:"已暫停授權",resumed:"已恢復授權",removed:"已刪除",failed:"操作失敗"},
  en:{products:"Products",settings:"Settings",notConnected:"Not connected",accounts:"{n} accounts",open:"Open",auth:"Authorization",conn:"Connection",delete:"Delete",cancel:"Cancel",confirmDelete:"Delete {name}?",deleteDesc:"This account will no longer use the AI on this Mac.",useOnMac:"Use {name} on this Mac",emptySub:"After authorization, {name} can use the AI on this Mac",emptyHint:"Sign in, choose Connect this Mac, then return here to confirm",waiting:"Ready — waiting for connection requests…",netbar:"Network interrupted — reconnecting automatically. Tasks resume on recovery.",launch:"Launch at login",appearance:"Appearance",system:"System",light:"Light",dark:"Dark",language:"Language",cloud:"Cloud address",deny:"Deny",allow:"Allow",wants:"{name} wants to connect to this Mac",opened:"Opened web",paused:"Authorization paused",resumed:"Authorization restored",removed:"Deleted",failed:"Action failed"},
  ja:{products:"製品",settings:"設定",notConnected:"未接続",accounts:"{n} アカウント",open:"開く",auth:"承認",conn:"接続",delete:"削除",cancel:"キャンセル",confirmDelete:"{name} を削除しますか？",deleteDesc:"このアカウントはこの Mac の AI を使えなくなります。",useOnMac:"この Mac で {name} を使う",emptySub:"承認後、{name} はこの Mac の AI を使えます",emptyHint:"ログインして「この Mac に接続」を選び、ここに戻って確認します",waiting:"準備完了 — 接続リクエスト待機中…",netbar:"ネットワーク切断 — 自動再接続中。復旧後はタスクが自動で再開します",launch:"ログイン時に起動",appearance:"外観",system:"システム",light:"ライト",dark:"ダーク",language:"言語",cloud:"クラウドアドレス",deny:"拒否",allow:"許可",wants:"{name} がこの Mac に接続しようとしています",opened:"ウェブを開きました",paused:"承認を一時停止しました",resumed:"承認を再開しました",removed:"削除しました",failed:"操作に失敗しました"}
};
const ui={view:"product",selected:"pandart",products:BASE_PRODUCTS.map(clone),settings:{launch_at_login:true,appearance:"auto",language:"auto",api_base:DEFAULT_API},pending:null,status:null};
const mq=window.matchMedia("(prefers-color-scheme: dark)");
const ipcState={seq:0,calls:new Map()};
window.PandaBridge={
  call(command,params={}){
    const id=String(++ipcState.seq);
    window.ipc.postMessage(JSON.stringify({id,command,params}));
    return new Promise((resolve,reject)=>ipcState.calls.set(id,{resolve,reject}));
  },
  receive(message){
    if(message.type==="response"){
      const item=ipcState.calls.get(message.id); if(!item)return;
      ipcState.calls.delete(message.id);
      message.ok?item.resolve(message.result):item.reject(new Error(message.error||"desktop command failed"));
      return;
    }
    if(message.type==="event"&&message.event==="deep_link")handleDeepLink(message.url).catch(showError);
    if(message.type==="event"&&message.event==="refresh")refresh().catch(()=>{});
  }
};
function clone(x){return JSON.parse(JSON.stringify(x))}
function sysLang(){const n=(navigator.language||"en").toLowerCase();if(n.startsWith("zh"))return /tw|hk|hant|mo/.test(n)?"zh-TW":"zh-CN";if(n.startsWith("ja"))return"ja";return"en"}
function lang(){return ui.settings.language==="auto"?sysLang():ui.settings.language}
function t(k,vars){let s=(TEXT[lang()]||TEXT["zh-CN"])[k]||k;if(vars)for(const key in vars)s=s.split("{"+key+"}").join(vars[key]);return s}
function esc(x){return String(x??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function applyTheme(){const mode=ui.settings.appearance||"auto";document.documentElement.dataset.theme=(mode==="dark"||(mode==="auto"&&mq.matches))?"dark":"light"}
if(mq.addEventListener)mq.addEventListener("change",applyTheme);
function render(){
  document.documentElement.lang=lang();
  document.getElementById("productLabel").textContent=t("products");
  document.getElementById("settingsLabel").textContent=t("settings");
  document.getElementById("railTabs").innerHTML=ui.products.map(p=>tabHtml(p)).join("");
  document.getElementById("settingsTab").setAttribute("aria-current",ui.view==="settings"?"true":"false");
  const pane=document.getElementById("pane");
  pane.innerHTML=ui.view==="settings"?settingsHtml():productHtml(productById(ui.selected)||ui.products[0]);
  document.getElementById("modalRoot").innerHTML=modalHtml();
  applyTheme();
}
function tabHtml(p){
  const n=(p.accounts||[]).length;
  const dot=p.connected?"ok":(p.connection==="reconnecting"?"retry":((p.accounts||[]).some(a=>a.authorized==="paused")?"warn":"off"));
  return `<button class="ptab" aria-current="${ui.view==="product"&&ui.selected===p.id}" onclick="pick('${p.id}')">
    <span class="pico" style="background:${p.color||BASE_PRODUCTS.find(x=>x.id===p.id)?.color}">${esc(p.initials||p.name.slice(0,2).toUpperCase())}</span>
    <span class="pt-main"><span class="pn">${esc(p.name)}</span><br><span class="pm">${n?t("accounts",{n}):t("notConnected")}</span></span>
    <i class="dot ${dot}"></i>
  </button>`;
}
function productHtml(p){
  if(!p)return"";
  const accounts=p.accounts||[];
  if(!accounts.length)return `<div class="phead"><div><div class="nm">${esc(p.name)}</div><div class="org">${esc(displayHost(p))}</div></div><div class="end"><button class="btn mini" onclick="openProduct('${p.id}')">${t("open")} ↗</button></div></div>${emptyHtml(p)}`;
  const offline=!!(ui.status&&ui.status.worker_running&&!ui.status.realtime_connected&&accounts.some(a=>a.authorized!=="paused"));
  return `<div class="phead"><div><div class="nm">${esc(p.name)}</div><div class="org">${esc(displayHost(p))}</div></div><div class="end"><button class="btn mini" onclick="openProduct('${p.id}')">${t("open")} ↗</button></div></div>
    ${offline?`<div class="netbar"><i class="dot warn pulse"></i>${t("netbar")}</div>`:""}
    ${accounts.map((a,i)=>accountHtml(p,a,i)).join("")}`;
}
function emptyHtml(p){return `<div class="empty">
  <h2>${t("useOnMac",{name:esc(p.name)})}</h2>
  <div class="sub">${t("emptySub",{name:esc(p.name)})}</div>
  <button class="btn primary" style="padding:8px 22px;font-size:13px;border-radius:9px" onclick="openProduct('${p.id}')">${t("open")} ${esc(p.name)} ↗</button>
  <div class="hint">${t("emptyHint")}</div>
  <div class="waiting"><i class="dot ok pulse"></i>${t("waiting")}</div>
</div>`}
function accountHtml(p,a,i){
  const active=a.authorized!=="paused";
  const connected=active&&!!a.connected;
  const retry=active&&!connected&&a.connection==="reconnecting";
  const accountLabel=esc(a.email||"Panda Account");
  return `<div class="acct" id="acct-${p.id}-${i}">
    <div class="who"><div class="em">${accountLabel}</div></div>
    <div class="swg">
      <span class="swi">${t("auth")} <button class="switch" role="switch" aria-checked="${active}" onclick="toggleAuth('${p.id}',${i})"></button></span>
      <span class="swi ${active?"":"dis"}">${t("conn")} <button class="switch ${retry?"retry":""}" role="switch" aria-checked="${connected}" aria-disabled="true" ${active?"tabindex='-1'":"disabled"}></button></span>
      <button class="del" title="${t("delete")}" onclick="confirmDelete(event,'${p.id}',${i})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M5 7h14M9 7V5h6v2M8 7l.8 12.5h6.4L16 7"/></svg></button>
    </div>
  </div>`;
}
function settingsHtml(){
  const s=ui.settings;
  return `<div class="phead"><div><div class="nm">${t("settings")}</div></div></div>
  <div class="rows">
    <div><span class="rico n-blue">↟</span><span class="t">${t("launch")}</span><div class="end"><button class="switch" role="switch" aria-checked="${!!s.launch_at_login}" onclick="setLaunch(${!s.launch_at_login})"></button></div></div>
    <div><span class="rico n-purple">◐</span><span class="t">${t("appearance")}</span><div class="end"><div class="seg">${["auto","light","dark"].map(v=>`<button aria-current="${s.appearance===v}" onclick="setAppearance('${v}')">${t(v==="auto"?"system":v)}</button>`).join("")}</div></div></div>
    <div><span class="rico n-orange">文</span><span class="t">${t("language")}</span><div class="end"><select class="select" onchange="setLanguage(this.value)">${LANG_OPTIONS.map(([code,label])=>`<option value="${code}" ${s.language===code?"selected":""}>${esc(label)}</option>`).join("")}</select></div></div>
    <div><span class="rico n-gray">☁</span><span class="t">${t("cloud")}</span><div class="end mono">${esc(hostOnly(s.api_base||DEFAULT_API))}</div></div>
  </div>`;
}
function modalHtml(){
  if(!ui.pending)return`<div class="sheetwrap" id="sheetwrap"></div>`;
  return `<div class="sheetwrap on" id="sheetwrap"><div class="sheet">
    <div class="dsrc"><h3>${t("wants",{name:esc(ui.pending.product_name)})}</h3><div class="org">${esc(ui.pending.domain)}</div></div>
    <div class="dacct">${esc(ui.pending.account)}</div>
    <div class="dfoot"><button class="btn" onclick="denyIntent()">${t("deny")}</button><button class="btn primary" onclick="allowIntent()">${t("allow")}</button></div>
  </div></div>`;
}
function productById(id){return ui.products.find(p=>p.id===id)}
function displayHost(p){return p.origin||p.domain||hostOnly(p.web_url)}
function hostOnly(value){try{return new URL(value).host}catch{return String(value||"").replace(/^https?:\/\//,"").replace(/\/.*$/,"")}}
function pick(id){ui.view="product";ui.selected=id;closePop();render()}
function pickSettings(){ui.view="settings";closePop();render()}
async function toggleAuth(productId,index){
  const p=productById(productId),a=p?.accounts?.[index];if(!a)return;
  try{await window.PandaBridge.call("toggle_authorization",{product_id:productId,account:a.id||a.email});toast(a.authorized==="paused"?t("resumed"):t("paused"));await refresh()}catch(e){showError(e)}
}
async function removeAccount(productId,index){
  const p=productById(productId),a=p?.accounts?.[index];if(!a)return;
  const row=document.getElementById(`acct-${productId}-${index}`);if(row)row.classList.add("leaving");
  closePop();
  try{await window.PandaBridge.call("remove_authorization",{product_id:productId,account_id:a.id||a.email,account:a.id||a.email});toast(t("removed"));await refresh()}catch(e){showError(e);await refresh()}
}
async function openProduct(productId){try{await window.PandaBridge.call("open_web",{product_id:productId});toast(t("opened"))}catch(e){showError(e)}}
async function setLaunch(value){ui.settings.launch_at_login=value;render();await saveSettings({launch_at_login:value})}
async function setAppearance(value){ui.settings.appearance=value;render();await saveSettings({appearance:value})}
async function setLanguage(value){ui.settings.language=value;render();await saveSettings({language:value})}
async function saveSettings(patch){try{ui.settings=await window.PandaBridge.call("update_settings",patch);render()}catch(e){showError(e)}}
async function refresh(){
  const status=await window.PandaBridge.call("status");
  ui.status=status;ui.settings={...ui.settings,...(status.settings||{})};
  ui.products=normalizeProducts(status.products||[]);
  if(!productById(ui.selected))ui.selected=ui.products[0]?.id||"pandart";
  render();return status;
}
function normalizeProducts(items){
  return BASE_PRODUCTS.map(base=>{
    const src=(items||[]).find(p=>p.id===base.id)||{};
    const accounts=Array.isArray(src.accounts)?src.accounts.map(a=>({
      id:a.id||null,email:a.email||"Panda Account",authorized:a.authorized||"active",connected:!!a.connected,connection:a.connection||"reconnecting"
    })):[];
    return {...clone(base),...src,initials:base.initials,color:base.color,accounts};
  });
}
async function handleDeepLink(raw){
  const url=new URL(raw);const intent=url.searchParams.get("intent");if(!intent)return;
  const api=url.searchParams.get("api")||DEFAULT_API;
  const pre=await window.PandaBridge.call("preview_intent",{api,intent});
  const known=knownFrom(pre.product_id,pre.product_name,pre.cloud_origin);
  ui.pending={api,intent,product_id:pre.product_id,product_name:known.name,domain:known.origin,account:pre.user_display_name||"Panda Account",select:known.id};
  render();
}
function knownFrom(id,name,origin){
  const hay=[id,name,origin].join(" ").toLowerCase();
  return hay.includes("pandart")||hay.includes("pandaart")?BASE_PRODUCTS[0]:BASE_PRODUCTS[1];
}
function denyIntent(){ui.pending=null;render()}
async function allowIntent(){
  const p=ui.pending;if(!p)return;
  try{await window.PandaBridge.call("claim_intent",{api:p.api,intent:p.intent,device_name:`Panda Bridge ${navigator.platform||"Desktop"}`});ui.pending=null;ui.selected=p.select;ui.view="product";await window.PandaBridge.call("start_worker");await refresh()}catch(e){showError(e)}
}
let popEl=null;
function closePop(){if(popEl){popEl.remove();popEl=null}}
function confirmDelete(ev,productId,index){
  ev.stopPropagation();const p=productById(productId),a=p?.accounts?.[index];if(!a)return;
  closePop();popEl=document.createElement("div");popEl.className="pop";
  const short=String(a.email||"").split("@")[0]||a.email;
  popEl.innerHTML=`<div class="cf-t">${t("confirmDelete",{name:esc(short)})}</div><div class="cf-d">${t("deleteDesc")}</div><div class="cf-row"><button class="btn" onclick="closePop()">${t("cancel")}</button><button class="btn dangerfill" onclick="removeAccount('${productId}',${index})">${t("delete")}</button></div>`;
  document.body.appendChild(popEl);
  const r=ev.currentTarget.getBoundingClientRect(),pw=popEl.offsetWidth,ph=popEl.offsetHeight;
  let x=Math.min(r.right-pw+4,innerWidth-pw-8),y=r.bottom+6;if(y+ph>innerHeight-8)y=r.top-ph-6;
  popEl.style.left=Math.max(8,x)+"px";popEl.style.top=y+"px";
}
document.addEventListener("pointerdown",e=>{if(popEl&&!popEl.contains(e.target))closePop()},true);
document.addEventListener("keydown",e=>{if(e.key==="Escape"){closePop();denyIntent()}});
let toastTimer;
function toast(msg){document.getElementById("toastTxt").textContent=msg;const el=document.getElementById("toast");el.classList.add("on");clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove("on"),1900)}
function showError(e){toast(`${t("failed")} · ${String(e?.message||e).slice(0,120)}`)}
function installFallback(){
  const emptyPandart=new URLSearchParams(location.search).get("empty");
  const mock={settings:{launch_at_login:true,appearance:new URLSearchParams(location.search).get("theme")||"auto",language:"auto",api_base:DEFAULT_API},products:normalizeProducts([
    {id:"pandart",name:"Pandart",origin:"pandart.cc",web_url:"https://pandart.cc",accounts:emptyPandart?[]:[{id:"demo_pt",email:"dreamsmoke57086",authorized:"active",connected:true,connection:"connected"}],connected:!emptyPandart,connection:emptyPandart?"offline":"connected"},
    {id:"otherline",name:"Otherline",origin:"otherline.cc",web_url:"https://otherline.cc",accounts:[{id:"demo_ot",email:"chaos.realms.ai@gmail.com",authorized:"active",connected:true,connection:"connected"},{id:"demo_pause",email:"panda-final@bridge.otherline.cc",authorized:"paused",connected:false,connection:"disabled"}],connected:true,connection:"connected"}
  ])};
  window.ipc={postMessage(raw){const req=JSON.parse(raw);const reply=(ok,result,error)=>setTimeout(()=>window.PandaBridge.receive({type:"response",id:req.id,ok,result,error}),50);
    if(req.command==="status")return reply(true,clone(mock));
    if(req.command==="settings")return reply(true,clone(mock.settings));
    if(req.command==="update_settings"){mock.settings={...mock.settings,...req.params};return reply(true,clone(mock.settings))}
    if(req.command==="toggle_authorization"){const p=mock.products.find(x=>x.id===req.params.product_id);const a=p?.accounts.find(x=>x.id===req.params.account||x.email===req.params.account);if(a){a.authorized=a.authorized==="paused"?"active":"paused";a.connected=a.authorized==="active";a.connection=a.connected?"connected":"disabled"}return reply(true,{ok:true})}
    if(req.command==="remove_authorization"){const p=mock.products.find(x=>x.id===req.params.product_id);if(p)p.accounts=p.accounts.filter(x=>x.id!==req.params.account_id&&x.email!==req.params.account_id);return reply(true,{ok:true})}
    if(req.command==="preview_intent")return reply(true,{product_id:"otherline",product_name:"Otherline",cloud_origin:"otherline.cc",user_display_name:"team-demo@otherline.cc"});
    if(req.command==="claim_intent"){mock.products[1].accounts.push({id:"team",email:"team-demo@otherline.cc",authorized:"active",connected:true,connection:"connected"});return reply(true,{ok:true})}
    if(req.command==="open_web"||req.command==="start_worker")return reply(true,{ok:true});
    reply(false,null,"unknown command");
  }};
  if(new URLSearchParams(location.search).get("settings"))ui.view="settings";
  if(new URLSearchParams(location.search).get("sheet"))setTimeout(()=>window.PandaBridge.receive({type:"event",event:"deep_link",url:"panda-bridge://connect?intent=demo&api=https://api.bridge.otherline.cc"}),120);
}
if(!window.ipc)installFallback();
refresh().then(status=>{if((status.products||[]).some(p=>(p.accounts||[]).some(a=>a.authorized==="active")))window.PandaBridge.call("start_worker").catch(()=>{})}).catch(()=>render());
</script>
</body>
