<!doctype html>
<html lang="zh-CN" data-theme="dark" data-os="mac">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bridge</title>
<style>
:root{
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","SF Pro Text","PingFang SC","Hiragino Sans GB",sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,monospace;
  --ease:cubic-bezier(.22,.61,.36,1);--ease-out:cubic-bezier(.16,1,.3,1);--spring:cubic-bezier(.34,1.4,.5,1);--dur:200ms;
  --energy-1:#27e6f2;--energy-2:#1f9bff;--energy-3:#0a6bff;
  --warn:#f4a73a;--danger:#ff5b52;--retry:#4d9bff;
}
[data-theme="dark"]{
  --desk:#000;
  --win:#050506;
  --win-edge:rgba(255,255,255,.10);
  --rail:#050506;
  --surface:rgba(255,255,255,.052);
  --surface-2:rgba(255,255,255,.025);
  --surface-hover:rgba(255,255,255,.075);
  --ink:#f2f3f8;--ink-2:#a8abba;--ink-3:#6c6f80;
  --line:rgba(255,255,255,.10);--line-soft:rgba(255,255,255,.055);
  --ok:#28e0b0;--ok-soft:rgba(40,224,176,.16);
  --energy-soft:rgba(39,230,242,.14);
  --warn-bg:rgba(244,167,58,.16);--danger-bg:rgba(255,91,82,.16);--retry-bg:rgba(77,155,255,.16);
  --card-shadow:0 1px 3px rgba(0,0,0,.34);
  --sheet-shadow:0 0 0 .5px rgba(255,255,255,.10),0 30px 80px rgba(0,0,0,.66),0 10px 26px rgba(0,0,0,.46);
  --pop-shadow:0 0 0 .5px var(--line),0 18px 50px rgba(0,0,0,.62),0 4px 12px rgba(0,0,0,.45);
  --switch-off:rgba(255,255,255,.16);
  --tile-edge:inset 0 1px 0 rgba(255,255,255,.22),inset 0 0 0 .5px rgba(0,0,0,.3),0 2px 6px rgba(0,0,0,.4);
  --ink-on-energy:#03121c;
  --win-shadow:0 0 0 .5px rgba(255,255,255,.07),0 36px 90px rgba(0,0,0,.66),0 60px 140px rgba(0,0,0,.42);
}
[data-theme="light"]{
  --desk:radial-gradient(1100px 720px at 16% -8%, #e9edf7 0%, transparent 58%),radial-gradient(900px 760px at 104% 110%, #e6eefb 0%, transparent 54%),linear-gradient(158deg, #dfe4ee 0%, #d2d7e3 62%, #ccd2e0 100%);
  --win:linear-gradient(168deg, #fbfcfe, #f3f5f9);
  --win-edge:rgba(255,255,255,.7);
  --rail:linear-gradient(180deg, #eef1f6, #e8ebf2);
  --surface:#ffffff;--surface-2:#f3f5f8;--surface-hover:#f0f3f8;
  --ink:#16181f;--ink-2:#565a66;--ink-3:#8b8f9c;
  --line:rgba(20,24,46,.12);--line-soft:rgba(20,24,46,.07);
  --ok:#0f9e87;--ok-soft:rgba(15,158,135,.12);
  --energy-1:#16a5ef;--energy-2:#0a7df7;--energy-3:#0641d9;
  --energy-soft:rgba(10,125,247,.10);
  --warn-bg:#faf2e1;--danger-bg:#fcecea;--retry-bg:#e8f1ff;
  --card-shadow:0 1px 2px rgba(15,18,40,.06);
  --sheet-shadow:0 0 0 .5px rgba(20,22,45,.14),0 28px 70px rgba(8,10,30,.3),0 8px 22px rgba(8,10,30,.16);
  --pop-shadow:0 0 0 .5px var(--line),0 16px 44px rgba(10,12,35,.2),0 3px 10px rgba(10,12,35,.12);
  --switch-off:rgba(20,24,46,.18);
  --tile-edge:inset 0 1px 0 rgba(255,255,255,.4),inset 0 0 0 .5px rgba(0,0,0,.05),0 1px 3px rgba(20,24,60,.2);
  --ink-on-energy:#fff;
  --win-shadow:0 0 0 .5px rgba(20,22,45,.16),0 30px 76px rgba(15,18,40,.32),0 56px 120px rgba(15,18,40,.2);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
input,select{font:inherit;color:inherit}
body{font-family:var(--font);font-size:13px;line-height:1.45;color:var(--ink);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;background:var(--desk);background-attachment:fixed;overflow:hidden;display:grid;place-items:center}
svg.full{width:100%!important;height:100%!important;display:block}

/* ===== 窗口 ===== */
.win{position:relative;width:840px;height:560px;border-radius:16px;overflow:hidden;background:var(--win);box-shadow:var(--win-shadow);border:1px solid var(--win-edge);display:flex;flex-direction:column;animation:winIn .5s var(--ease-out) both}
[data-os="windows"] .win{border-radius:9px}
@keyframes winIn{from{opacity:0;transform:translateY(10px) scale(.99)}to{opacity:1;transform:none}}
/* 真窗口内（wry）：填满原生窗口，去掉假桌面/外框 */
html.app body{background:var(--win);display:block}
html.app .win{width:100%;height:100%;border-radius:0;box-shadow:none;border:0;animation:none}

.titlebar{display:flex;align-items:center;gap:10px;height:46px;flex:none;padding:0 0 0 14px;border-bottom:1px solid var(--line-soft);position:relative;z-index:5}
.titlebar button{-webkit-app-region:no-drag}
[data-os="mac"] .titlebar{display:none}
html.app .titlebar{display:none}
.tb-spacer{flex:1}
.body{flex:1;min-height:0;display:grid;grid-template-columns:212px 1fr}

/* ===== 侧栏 ===== */
.rail{position:relative;background:var(--rail);border-right:1px solid var(--line-soft);display:flex;flex-direction:column;padding:0 11px 12px}
[data-os="windows"] .rail{padding-top:12px}
.rail-top{display:flex;flex-direction:column;gap:12px;padding:15px 6px 16px}
html[data-os="windows"]:not(.app) .rail-top{display:none}
html.app .rail-top .lights{display:none}
.lights{display:flex;gap:8px}
.lights i{width:12px;height:12px;border-radius:50%;position:relative;box-shadow:inset 0 0 0 .5px rgba(0,0,0,.18)}
.lights i:nth-child(1){background:#ff5f57}.lights i:nth-child(2){background:#febc2e}.lights i:nth-child(3){background:#28c840}
.lights i::after{content:"";position:absolute;inset:1.5px 0 0;border-radius:inherit;background:linear-gradient(rgba(255,255,255,.4),transparent 60%)}
.brand{display:flex;align-items:center;gap:9px}
.brand .mark{width:46px;height:27px;flex:none;display:grid;place-items:center;filter:drop-shadow(0 1px 5px rgba(31,155,255,.45))}
.brand b{font-size:13.5px;font-weight:650;letter-spacing:-.01em}
.rail-lab{font-size:10px;font-weight:700;color:var(--ink-3);letter-spacing:.08em;padding:0 7px 8px;text-transform:uppercase}
.pnode{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:8px;border-radius:11px;margin-bottom:4px;border:1px solid transparent;color:var(--ink);position:relative;transition:background var(--dur),border-color var(--dur)}
.pnode:hover{background:var(--surface)}
.pnode[aria-current="true"]{background:var(--surface);border-color:var(--line-soft);box-shadow:var(--card-shadow)}
.pnode[aria-current="true"]::before{content:"";position:absolute;left:-11px;top:50%;transform:translateY(-50%);width:3px;height:18px;border-radius:0 3px 3px 0;background:linear-gradient(var(--energy-1),var(--energy-2))}
.ptile{width:30px;height:30px;border-radius:9px;flex:none;display:grid;place-items:center;color:#fff;font-size:11px;font-weight:700;letter-spacing:.01em;box-shadow:var(--tile-edge);position:relative;overflow:hidden}
.ptile::after{content:"";position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.18),transparent 55%);pointer-events:none}
.ptile img{width:100%;height:100%;object-fit:contain;padding:2px}
.pmeta{min-width:0;flex:1}
.pname{font-size:12.5px;font-weight:560;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sdot{width:7px;height:7px;border-radius:50%;flex:none;background:var(--ink-3);opacity:.55;margin-left:auto}
.sdot.live{background:var(--energy-1);opacity:1;box-shadow:0 0 0 3px var(--energy-soft),0 0 8px var(--energy-1)}
.sdot.warn{background:var(--warn);opacity:1}
.sdot.retry{background:var(--retry);opacity:1;animation:pulse 1.4s var(--ease) infinite}
.spacer{flex:1}
.engine{display:flex;align-items:center;gap:8px;margin:0 3px 9px;padding:8px 10px;border-radius:10px;background:var(--surface-2);border:1px solid var(--line-soft);font-size:10.5px;color:var(--ink-2)}
.engine .e-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);box-shadow:0 0 7px var(--ok);flex:none}
.engine .e-dot.off{background:var(--retry);box-shadow:0 0 7px var(--retry);animation:pulse 1.4s var(--ease) infinite}
.engine b{font-weight:600;color:var(--ink);font-size:10.5px}
.settab{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:8px;border-radius:11px;border:1px solid transparent;color:var(--ink);transition:background var(--dur)}
.settab:hover{background:var(--surface)}
.settab[aria-current="true"]{background:var(--surface);border-color:var(--line-soft);box-shadow:var(--card-shadow)}
.settab .ptile{background:linear-gradient(160deg,#8c93a3,#5b6273)}
.settab .ptile svg{width:16px;height:16px;color:#fff}

/* ===== 主区 ===== */
.main{min-width:0;position:relative;display:flex;flex-direction:column;padding:16px 22px 18px;overflow:hidden}
.wincontrols{display:flex;align-items:stretch;height:46px}
[data-os="mac"] .wincontrols{display:none}
html.app .wincontrols{display:none}
.wincontrols button{width:46px;display:grid;place-items:center;color:var(--ink-2);transition:background .12s,color .12s}
.wincontrols button:hover{background:var(--surface-hover);color:var(--ink)}
.wincontrols .x:hover{background:#e0382f;color:#fff}
.ptop{display:flex;align-items:center;gap:10px;padding:2px 2px 13px;flex:none}
.ptlab{font-size:11px;font-weight:600;color:var(--ink-3);letter-spacing:.04em}
.ptend{margin-left:auto;display:flex;align-items:center;gap:6px}
.btn{display:inline-flex;align-items:center;gap:5px;justify-content:center;padding:6px 13px;border-radius:9px;font-size:12px;font-weight:520;border:1px solid var(--line);background:var(--surface);color:var(--ink);transition:background var(--dur),transform var(--dur),box-shadow var(--dur),filter var(--dur)}
.btn:hover{background:var(--surface-hover)}
.btn:active{transform:translateY(.5px)}
.btn svg{width:12px;height:12px}
.btn.energy{border:none;color:var(--ink-on-energy);font-weight:600;background:linear-gradient(150deg,var(--energy-1),var(--energy-2));box-shadow:0 4px 16px rgba(31,155,255,.4),inset 0 1px 0 rgba(255,255,255,.3)}
.btn.energy:hover{filter:brightness(1.06)}
.btn.mini{padding:4px 11px;font-size:11.5px;border-radius:8px}
.btn.dangerfill{border:none;color:#fff;font-weight:540;background:linear-gradient(160deg,#ff6c5f,#e0382f);box-shadow:0 3px 12px rgba(224,56,47,.34)}
.iconbtn{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;color:var(--ink-3);transition:background var(--dur),color var(--dur)}
.iconbtn:hover{background:var(--surface-hover);color:var(--ink)}
.iconbtn svg{width:17px;height:17px}

/* ===== 账号卡 ===== */
.acctscroll{flex:1;overflow-y:auto;margin:2px -6px 0;padding:0 6px}
.acctscroll::-webkit-scrollbar{width:6px}.acctscroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px}
.acard{display:flex;align-items:center;gap:12px;padding:13px 15px;border-radius:14px;background:var(--surface);border:1px solid var(--line-soft);box-shadow:var(--card-shadow);margin-bottom:10px;position:relative;overflow:hidden;transition:background var(--dur),transform var(--dur),box-shadow var(--dur),opacity .22s;animation:enter .34s var(--ease) both}
.acard:hover{background:var(--surface-hover);transform:translateY(-1px)}
.acard.leaving{opacity:0;transform:translateY(-6px) scale(.98)}
.acard.live{border-color:color-mix(in srgb,var(--energy-1) 34%,transparent)}
.acard.live::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--energy-1),var(--energy-2));box-shadow:0 0 12px var(--energy-1)}
@keyframes enter{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.avatar{width:36px;height:36px;border-radius:11px;flex:none;display:grid;place-items:center;color:#fff;font-size:12px;font-weight:650;box-shadow:var(--tile-edge);position:relative;overflow:hidden}
.avatar::after{content:"";position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.2),transparent 55%)}
.awho{flex:1;min-width:0}
.aem{font-size:13px;font-weight:560;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ameta{display:flex;align-items:center;gap:8px;margin-top:4px}
.pill{display:inline-flex;align-items:center;gap:6px;padding:2.5px 9px;border-radius:99px;font-size:10.5px;font-weight:560;white-space:nowrap}
.pill .d{width:6px;height:6px;border-radius:50%;flex:none}
.pill.live{background:var(--energy-soft);color:var(--energy-1)}
.pill.live .d{background:var(--energy-1);box-shadow:0 0 7px var(--energy-1)}
[data-theme="light"] .pill.live{color:#0a7df7}
.pill.retry{background:var(--retry-bg);color:var(--retry)}
.pill.retry .d{background:var(--retry);animation:pulse 1.2s var(--ease) infinite}
.pill.idle,.pill.paused{background:var(--surface-2);color:var(--ink-3)}
.pill.idle .d,.pill.paused .d{background:var(--ink-3)}
.atime{font-size:10.5px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.actrl{display:flex;align-items:center;gap:12px;flex:none}
.swlabel{font-size:10px;color:var(--ink-3);font-weight:560}
.switch{width:38px;height:22px;border-radius:99px;background:var(--switch-off);position:relative;flex:none;transition:background var(--dur) var(--ease);box-shadow:inset 0 0 0 .5px rgba(0,0,0,.12)}
.switch::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.35);transition:left .24s var(--spring)}
.switch[aria-checked="true"]{background:linear-gradient(150deg,var(--energy-1),var(--energy-2))}
.switch[aria-checked="true"]::after{left:18px}
.amore{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;color:var(--ink-3);flex:none;transition:background var(--dur),color var(--dur)}
.amore:hover{background:var(--surface-hover);color:var(--ink)}
.amore svg{width:17px;height:17px}

/* ===== 空态 ===== */
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;animation:enter .35s var(--ease)}
.elogo{width:64px;height:64px;border-radius:18px;display:grid;place-items:center;color:#fff;font-size:22px;font-weight:700;box-shadow:var(--tile-edge);position:relative;overflow:hidden;margin-bottom:6px}
.elogo::after{content:"";position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.18),transparent 55%);pointer-events:none}
.empty h2{font-size:19px;font-weight:700;letter-spacing:-.025em;margin-top:14px}
.empty .esub{font-size:12.5px;color:var(--ink-2);margin:7px 0 22px;max-width:320px;line-height:1.55}
.empty .ewait{display:inline-flex;align-items:center;gap:7px;margin-top:18px;font-size:11.5px;color:var(--ink-3);padding:7px 14px;border-radius:99px;background:var(--surface-2);border:1px solid var(--line-soft)}
.empty .ewait .d{width:7px;height:7px;border-radius:50%;background:var(--energy-1);box-shadow:0 0 8px var(--energy-1);animation:pulse 1.6s var(--ease) infinite}

/* ===== 网络条 ===== */
.netbar{display:flex;align-items:center;gap:8px;margin:0 0 11px;padding:8px 12px;border-radius:10px;background:var(--retry-bg);color:var(--retry);font-size:11.5px;font-weight:500;animation:enter .3s var(--ease)}
.netbar .d{width:7px;height:7px;border-radius:50%;background:var(--retry);animation:pulse 1.3s var(--ease) infinite;flex:none}

/* ===== 设置 ===== */
.setscroll{flex:1;overflow-y:auto;margin:6px -6px 0;padding:0 6px}
.setscroll::-webkit-scrollbar{width:6px}.setscroll::-webkit-scrollbar-thumb{background:var(--line);border-radius:99px}
.glab{font-size:10px;font-weight:700;color:var(--ink-3);letter-spacing:.05em;padding:0 4px 8px;text-transform:uppercase}
.rows{background:var(--surface);border:1px solid var(--line-soft);border-radius:14px;box-shadow:var(--card-shadow);margin-bottom:16px;overflow:hidden}
.rows>*{display:flex;align-items:center;gap:12px;padding:11px 14px;min-height:48px}
.rows>*+*{border-top:1px solid var(--line-soft)}
.rico{width:26px;height:26px;border-radius:8px;flex:none;display:grid;place-items:center;color:#fff;box-shadow:var(--tile-edge);position:relative;overflow:hidden;font-size:14px}
.rico svg{width:14px;height:14px}
.rico::after{content:"";position:absolute;inset:0;background:linear-gradient(rgba(255,255,255,.18),transparent 55%)}
.n-blue{background:linear-gradient(165deg,#4d96ff,#2563eb)}
.n-indigo{background:linear-gradient(165deg,#8f8bff,#5b54e6)}
.n-orange{background:linear-gradient(165deg,#ffab47,#f07b16)}
.n-cyan,.n-teal{background:linear-gradient(165deg,#2fd8ea,#149ca8)}
.n-gray{background:linear-gradient(165deg,#9aa0ad,#6b7280)}
.n-sky{background:linear-gradient(165deg,#5fb6ff,#2f7bff)}
.n-purple{background:linear-gradient(165deg,#9d7bff,#6d4fe0)}
.n-red{background:linear-gradient(165deg,#ff6c5f,#e0382f)}
.rtext{min-width:0;flex:1}
.rows .t{font-size:12.5px;font-weight:520}
.rows .d{font-size:10.5px;color:var(--ink-3);margin-top:1px}
.rows .end{margin-left:auto;display:flex;align-items:center;gap:8px;flex:none}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--surface-2)}
.seg button{padding:4px 12px;font-size:11.5px;color:var(--ink-2);transition:background .12s,color .12s}
.seg button+button{border-left:1px solid var(--line-soft)}
.seg button[aria-current="true"]{background:linear-gradient(150deg,var(--energy-1),var(--energy-2));color:var(--ink-on-energy);font-weight:560}
.select{border:1px solid var(--line);border-radius:9px;background:var(--surface-2);font-size:11.5px;padding:5px 26px 5px 10px;color:var(--ink);cursor:pointer;-webkit-appearance:none;appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' fill='none' stroke='%238c8d96' stroke-width='2' stroke-linecap='round'><path d='M2 4l3 3 3-3'/></svg>");background-repeat:no-repeat;background-position:right 9px center}
.input{border:1px solid var(--line);border-radius:9px;background:var(--surface-2);font-size:11.5px;padding:6px 10px;min-width:180px;outline:0;color:var(--ink)}
.input:focus{border-color:color-mix(in srgb,var(--energy-2) 55%,var(--line));box-shadow:0 0 0 2px var(--energy-soft)}
.profile-actions{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.server-name{max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mono{font-family:var(--mono);font-size:11px}

/* ===== 授权 sheet ===== */
#modalRoot{display:contents}
.sheetwrap{position:absolute;inset:0;z-index:9;display:none;background:rgba(6,8,18,.5);backdrop-filter:blur(6px) saturate(120%);-webkit-backdrop-filter:blur(6px) saturate(120%)}
.sheetwrap.on{display:block;animation:fade .22s var(--ease)}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.94);opacity:0;width:400px;background:var(--win);border:1px solid var(--win-edge);border-radius:18px;box-shadow:var(--sheet-shadow);transition:transform .3s var(--spring),opacity .22s var(--ease);overflow:hidden}
.sheetwrap.on .sheet{transform:translate(-50%,-50%) scale(1);opacity:1}
.sheet.haz{width:420px}
.sh-glow{position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:240px;height:160px;background:radial-gradient(closest-side,var(--energy-soft),transparent);pointer-events:none}
.sh-top{display:flex;flex-direction:column;align-items:center;text-align:center;padding:26px 26px 0;position:relative}
.sh-mini{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sh-mini .t{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;color:#fff;font-size:15px;font-weight:700;box-shadow:var(--tile-edge);position:relative;overflow:hidden}
.sh-mini .t img{width:100%;height:100%;object-fit:contain;padding:3px}
.sh-mini .conn{display:flex;gap:3px}
.sh-mini .conn i{width:4px;height:4px;border-radius:50%;background:var(--energy-1);box-shadow:0 0 6px var(--energy-1);animation:blink 1.4s var(--ease) infinite}
.sh-mini .conn i:nth-child(2){animation-delay:.2s}.sh-mini .conn i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.25}50%{opacity:1}}
.sh-mini .mac{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;color:var(--ink-on-energy);background:linear-gradient(150deg,var(--energy-1),var(--energy-2));box-shadow:var(--tile-edge)}
.sh-mini .mac svg{width:22px;height:22px}
.sh-top h3{font-size:16.5px;font-weight:700;letter-spacing:-.02em;line-height:1.25}

.sh-top .acctline{font-size:12.5px;font-weight:560;color:var(--ink-2);margin-top:11px;overflow-wrap:anywhere}
.authsum{margin:16px 22px 0;border:1px solid var(--line-soft);border-radius:12px;background:var(--surface-2);overflow:hidden;text-align:left}

.sh-foot{display:flex;gap:9px;padding:18px 22px 20px}
.sh-foot .btn{flex:1;padding:9px;font-size:13px;border-radius:11px}
.sh-foot .btn[disabled]{opacity:.45;pointer-events:none}
/* 危险授权区（高危/critical 才出现） */
.dgr{margin:16px 22px 0}
.dgr-h{display:flex;align-items:center;gap:7px;padding:8px 12px;border-radius:10px;font-size:11.5px;font-weight:600;letter-spacing:-.01em;margin-bottom:10px}
.dgr-h svg{flex:none;width:14px;height:14px}
.dgr.warn .dgr-h{background:var(--warn-bg);color:var(--warn)}
.dgr.crit .dgr-h{background:var(--danger-bg);color:var(--danger)}

.dperm{display:flex;align-items:center;gap:11px;padding:10px 12px}
.dperm+.dperm{border-top:1px solid var(--line-soft)}
.dp-main{min-width:0;flex:1}
.dp-main .pn{font-size:12.5px;font-weight:540;line-height:1.25}
.dp-main .pd{font-size:10.5px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dp-end{flex:none;display:flex;align-items:center;gap:6px;max-width:46%}
.dp-path{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10.5px;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dp-path svg{flex:none;width:12px;height:12px;color:var(--ok)}
.dp-pick{padding:4px 11px;font-size:11px;border-radius:8px;border:1px solid var(--line);background:var(--surface);color:var(--energy-2);font-weight:560;white-space:nowrap}
.dp-meta{font-size:11px;color:var(--ink-2)}
.dctx{margin:11px 2px 0;font-size:10.5px;line-height:1.5;color:var(--ink-3)}
.dperr{color:var(--danger);font-size:10.5px;margin:6px 2px 0}

/* ===== popover ===== */
.pop{position:fixed;z-index:40;min-width:210px;background:var(--win);border:1px solid var(--line);border-radius:13px;box-shadow:var(--pop-shadow);padding:5px;animation:popin .15s var(--ease)}
@keyframes popin{from{opacity:0;transform:translateY(-4px) scale(.97)}to{opacity:1;transform:none}}
.pop .mi{display:flex;align-items:center;gap:9px;width:100%;padding:7px 10px;border-radius:9px;font-size:12.5px;color:var(--ink);text-align:left;transition:background .1s}
.pop .mi svg{width:14px;height:14px;flex:none}

.pop .mi.danger{color:var(--danger)}.pop .mi.danger:hover{background:var(--danger-bg)}

.pop .cf-t{font-size:13px;font-weight:600;padding:9px 11px 3px}
.pop .cf-d{font-size:11.5px;color:var(--ink-3);padding:0 11px 9px;line-height:1.5}
.pop .cf-row{display:flex;gap:7px;padding:2px 7px 5px}
.pop .cf-row .btn{flex:1;padding:7px;font-size:12px;border-radius:9px}

/* ===== toast ===== */
.toast{position:absolute;left:50%;bottom:18px;transform:translate(-50%,18px);opacity:0;z-index:50;display:flex;align-items:center;gap:8px;padding:9px 17px;border-radius:99px;font-size:12px;font-weight:500;background:rgba(20,22,32,.95);color:#fff;box-shadow:0 12px 32px rgba(0,0,0,.5),inset 0 .5px 0 rgba(255,255,255,.14);backdrop-filter:blur(12px);transition:transform .3s var(--spring),opacity .22s var(--ease);pointer-events:none}

.toast .d{width:7px;height:7px;border-radius:50%;background:var(--energy-1);box-shadow:0 0 8px var(--energy-1)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
:focus-visible{outline:2px solid var(--energy-1);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}

const AVATAR_COLORS=["linear-gradient(155deg,#8d80f5,#5b4dd6)","linear-gradient(155deg,#39b2ae,#117a84)","linear-gradient(155deg,#f0b35e,#d98a1f)","linear-gradient(155deg,#5a9cff,#2a6de8)","linear-gradient(155deg,#e46b8a,#b13d6a)","linear-gradient(155deg,#54c08a,#1f8a5a)"];
function avatarFor(email){
  const s=String(email||"PB");
  const local=s.replace(/@.*/,"");
  const toks=local.split(/[.\-_+\s]+/).filter(Boolean);
  const letters=((toks.length>=2?toks.slice(0,2).map(x=>x[0]).join(""):local.slice(0,2))||"PB").toUpperCase();
  let hash=0;for(const ch of s)hash=(hash*31+ch.charCodeAt(0))>>>0;
  return {txt:letters,bg:AVATAR_COLORS[hash%AVATAR_COLORS.length]};
}

function engineHtml(){

  return reconnect?`<span class="e-dot off"></span><span>${t("engineReconnect")}</span>`:`<span class="e-dot"></span><span>${t("engineRunning")}</span>`;
}
function productState(p){
  const accts=p.accounts||[];
  if(p.connected)return"live";
  if(p.connection==="reconnecting"||(ui.status&&ui.status.worker_running&&!ui.status.realtime_connected&&accts.some(a=>a.authorized!=="paused")))return"retry";
  return"off";
}
function tabHtml(p){
  const st=productState(p);
  const dot=st==="live"?"live":st==="retry"?"retry":((p.accounts||[]).some(a=>a.authorized==="paused")?"warn":"");
  const style=productStyle(p);
  const tile=style.iconSrc?`<span class="ptile" style="background:${style.color}"><img src="${esc(style.iconSrc)}" alt=""></span>`:`<span class="ptile" style="background:${style.color}">${esc(p.initials||style.initials)}</span>`;
  return `<button class="pnode" aria-current="${ui.view==="product"&&ui.selected===p.id}" onclick="pick('${p.id}')">
    ${tile}
    <span class="pmeta"><span class="pname">${esc(p.name)}</span></span>
    <i class="sdot ${dot}"></i>

}
function productHtml(p){

}

function accountHtml(p,a,i){

  let pill;
  if(!active)pill=`<span class="pill paused"><i class="d"></i>${t("pausedTag")}</span>`;
  else if(connected)pill=`<span class="pill live"><i class="d"></i>${t("connected")}</span>`;

  return `<div class="acard ${connected?"live":""}" id="acct-${p.id}-${i}">

    shellExtra=permRowHtml("cwd",d.shell.cwd)
      +`<div class="dperm"><span class="rico n-gray">${ICN.net}</span><div class="dp-main"><div class="pn">${t("permNet")}</div></div><div class="dp-end"><span class="dp-meta">${d.shell.net==="allow_outbound"?t("netAllow"):t("netDeny")}</span></div></div>`
      +`<div class="dperm"><span class="rico n-gray">${ICN.sub}</span><div class="dp-main"><div class="pn">${t("permSub")}</div></div><div class="dp-end"><span class="dp-meta">${d.shell.exec_subtree?t("subYes"):t("subNo")}</span></div></div>`;
  }

  </div>`;
}
function permRowHtml(kind,r){
  const ic={read:["n-sky",ICN.read],write:["n-orange",ICN.write],cwd:["n-purple",ICN.cwd]}[kind];
  const label={read:t("permRead"),write:t("permWrite"),cwd:t("permCwd")}[kind];
  const end=r.bound
    ?`<span class="dp-path">${ICN.check}<span>${esc(r.redacted_path||r.path_display)}</span></span>`
    :`<button class="dp-pick" onclick="pickRoot('${kind}','${esc(r.id)}')">${t("pickDir")}</button>`;
  return `<div class="dperm"><span class="rico ${ic[0]}">${ic[1]}</span><div class="dp-main"><div class="pn">${esc(label)}</div><div class="pd">${esc(r.path_display)}</div></div><div class="dp-end">${end}</div></div>`;
}
function dangerFromPreview(){return null}
function rootRow(kind,r,fsState){
  const id=r.id||"";const s=(fsState||{})[id]||{};
  return {kind,id,path_display:r.path_display||id,bound:!!s.bound,redacted_path:s.redacted_path||null};
}
function findDangerRow(d,kind,id){
  if(kind==="cwd")return d.shell?d.shell.cwd:null;
  return (d.fsRows||[]).find(r=>r.kind===kind&&r.id===id)||null;

function productById(id){return ui.products.find(p=>p.id===id)}
function displayHost(p){return p.origin||p.domain||hostOnly(p.web_url)}
function hostOnly(value){try{return new URL(value).host}catch{return String(value||"").replace(/^https?:\/\//,"").replace(/\/.*$/,"")}}
function pick(id){ui.view="product";ui.selected=id;closePop();render()}
function pickSettings(){ui.view="settings";closePop();render()}

async function refresh(){
  const status=await window.PandaBridge.call("status");
  ui.status=status;ui.settings={...ui.settings,...(status.settings||{})};
  ui.products=normalizeProducts(status.products||[]);
  if(!productById(ui.selected))ui.selected=ui.products[0]?.id||"bridge-demo";
  render();return status;
}
function normalizeProducts(items){
  const source=Array.isArray(items)&&items.length?items:BASE_PRODUCTS;
  return source.map((src,index)=>{
    const base=BASE_PRODUCTS.find(p=>p.id===src.id)||{};
    const style=productStyle(src,index);
    const accounts=Array.isArray(src.accounts)?src.accounts.map(a=>({
      id:a.id||null,email:a.email||"Panda Account",authorized:a.authorized||"active",connected:!!a.connected,connection:a.connection||"reconnecting"
    })):[];
    return {...clone(base),...src,origin:src.origin||base.origin||hostOnly(src.web_url),web_url:src.web_url||base.web_url||src.origin||"",initials:style.initials,color:style.color,iconSrc:style.iconSrc,accounts,connected:!!src.connected,connection:src.connection||"offline"};
  });
}
function productStyle(p,index=0){
  const base=BASE_PRODUCTS.find(x=>x.id===p?.id);
  if(base)return {initials:base.initials,color:base.color};
  const name=String(p?.name||p?.id||"PB").trim();
  const initials=name.split(/[\s_-]+/).filter(Boolean).slice(0,2).map(x=>x[0]).join("").toUpperCase()||name.slice(0,2).toUpperCase()||"PB";
  const colors=["linear-gradient(150deg,#2f7bff,#14a6a6)","linear-gradient(150deg,#4d8dff,#7857d9)","linear-gradient(150deg,#1f9d67,#2374d9)","linear-gradient(150deg,#e46b4c,#7b61ff)"];
  let hash=index;for(const ch of String(p?.id||name))hash=(hash*31+ch.charCodeAt(0))>>>0;
  return {initials,color:colors[hash%colors.length]};
}
async function handleDeepLink(raw){
  const url=new URL(raw);const intent=url.searchParams.get("intent");if(!intent)return;
  const api=url.searchParams.get("api")||DEFAULT_API;
  const pre=await window.PandaBridge.call("preview_intent",{api,intent});
  const policy=pre.local_policy||{};
  const displayName=(policy.display&&policy.display.product)||pre.product_name;
  const known=knownFrom(pre.product_id,displayName,pre.cloud_origin);
  ui.pending={api,intent,product_id:pre.product_id,product_name:displayName||known.name,domain:known.origin,source_origin:policy.source_origin||pre.cloud_origin,policy_caps:pre.capabilities||policy.capabilities||[],product_authorization:policy.product_authorization||{},account:pre.user_display_name||"Panda Account",account_id:pre.user_id||null,select:known.id,danger:dangerFromPreview(pre)};
  render();
}
function showDeepLinkError(raw,error){
  let domain="panda-bridge://connect";
  try{const u=new URL(raw);domain=u.searchParams.get("api")||u.protocol}catch{}
  ui.pending={product_name:"Bridge authorization",domain,error:String(error?.message||error).slice(0,240)};
  render();
  showError(error);
}
function knownFrom(id,name,origin){
  const norm=normalizeProductKey(id);
  const existing=ui.products.find(p=>normalizeProductKey(p.id)===norm||normalizeProductKey(p.name)===norm);
  if(existing)return existing;
  const hay=[id,name,origin].join(" ").toLowerCase();
  if(hay.includes("bridge"))return BASE_PRODUCTS[0];
  if(hay.includes("example"))return BASE_PRODUCTS[1];
  const dynamic={id:id||normalizeProductKey(name)||"custom",name:name||id||"Custom Product",origin:origin||hostOnly(DEFAULT_API),web_url:origin||""};
  return {...dynamic,...productStyle(dynamic)};
}
function normalizeProductKey(value){return String(value||"").replace(/[^a-z0-9]/gi,"").toLowerCase()}
function denyIntent(){ui.pending=null;render()}
async function allowIntent(){
  const p=ui.pending;if(!p)return;
  try{
    const pending=await window.PandaBridge.call("claim_intent_preview",{api:p.api,intent:p.intent,device_name:`Panda Bridge ${navigator.platform||"Desktop"}`});
    await window.PandaBridge.call("confirm_pending_intent",{pending_id:pending.pending_id,intent:p.intent});
    ui.pending=null;ui.selected=p.select;ui.view="product";await window.PandaBridge.call("start_worker");await refresh()
  }catch(e){showError(e)}
}
let popEl=null;
function closePop(){if(popEl){popEl.remove();popEl=null}}
function confirmDelete(ev,productId,index){
  ev.stopPropagation();const p=productById(productId),a=p?.accounts?.[index];if(!a)return;
  closePop();popEl=document.createElement("div");popEl.className="pop";
  const short=String(a.email||"").split("@")[0]||a.email;
  popEl.innerHTML=`<div class="cf-t">${t("confirmDelete",{name:esc(short)})}</div><div class="cf-d">${t("deleteDesc")}</div><div class="cf-row"><button class="btn" onclick="closePop()">${t("cancel")}</button><button class="btn dangerfill" onclick="removeAccount('${productId}',${index})">${t("delete")}</button></div>`;
  document.body.appendChild(popEl);
  const r=ev.currentTarget.getBoundingClientRect(),pw=popEl.offsetWidth,ph=popEl.offsetHeight;
  let x=Math.min(r.right-pw+4,innerWidth-pw-8),y=r.bottom+6;if(y+ph>innerHeight-8)y=r.top-ph-6;
  popEl.style.left=Math.max(8,x)+"px";popEl.style.top=y+"px";
}
document.addEventListener("pointerdown",e=>{if(popEl&&!popEl.contains(e.target))closePop()},true);
document.addEventListener("keydown",e=>{if(e.key==="Escape"){closePop();denyIntent()}});
let toastTimer;
function toast(msg){document.getElementById("toastTxt").textContent=msg;const el=document.getElementById("toast");el.classList.add("on");clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove("on"),1900)}
function showError(e){toast(`${t("failed")} · ${String(e?.message||e).slice(0,120)}`)}
function installFallback(){
  const emptyDemo=new URLSearchParams(location.search).get("empty");
  const mock={settings:{launch_at_login:true,appearance:new URLSearchParams(location.search).get("theme")||"auto",language:"auto",api_base:DEFAULT_API,cloud_profiles:[clone(OFFICIAL_PROFILE)],selected_cloud_profile_id:"official"},products:normalizeProducts([
    {id:"bridge-demo",name:"Bridge Demo",origin:"bridge.chaos-realms.cc",web_url:"https://bridge.chaos-realms.cc",accounts:emptyDemo?[]:[{id:"demo_bridge",email:"chaos.realms.ai@gmail.com",authorized:"active",connected:true,connection:"connected"},{id:"demo_dr",email:"dreamsmoke57086",authorized:"active",connected:false,connection:"reconnecting"},{id:"demo_pf",email:"panda-final@bridge.otherline.cc",authorized:"paused",connected:false,connection:"disabled"}],connected:!emptyDemo,connection:emptyDemo?"offline":"connected"},
    {id:"example-client",name:"Example Client",origin:"example.test",web_url:"https://example.test",accounts:[{id:"demo_client",email:"client@example.test",authorized:"active",connected:true,connection:"connected"}],connected:true,connection:"connected"}
  ])};
  window.ipc={postMessage(raw){const req=JSON.parse(raw);const reply=(ok,result,error)=>setTimeout(()=>window.PandaBridge.receive({type:"response",id:req.id,ok,result,error}),50);
    if(req.command==="status")return reply(true,clone(mock));
    if(req.command==="settings")return reply(true,clone(mock.settings));
    if(req.command==="update_settings"){mock.settings={...mock.settings,...req.params};return reply(true,clone(mock.settings))}
    if(req.command==="select_cloud_profile"){mock.settings.selected_cloud_profile_id=req.params.profile_id||"official";const p=mock.settings.cloud_profiles.find(x=>x.id===mock.settings.selected_cloud_profile_id)||mock.settings.cloud_profiles[0];mock.settings.api_base=p.api_base;mock.products=normalizeProducts(p.products||BASE_PRODUCTS);return reply(true,clone(mock.settings))}
    if(req.command==="add_cloud_profile"){const api=req.params.api;const id="profile_demo";const profile={id,name:hostOnly(api),api_base:api,web_origin:api,source:"user",products:[{id:"acme-demo",name:"Acme Demo",origin:api,web_url:api+"/app"}]};mock.settings.cloud_profiles=mock.settings.cloud_profiles.filter(p=>p.id!==id).concat([profile]);mock.settings.selected_cloud_profile_id=id;mock.settings.api_base=api;mock.products=normalizeProducts(profile.products);return reply(true,clone(mock.settings))}
    if(req.command==="refresh_cloud_profile")return reply(true,clone(mock.settings));
    if(req.command==="remove_cloud_profile"){mock.settings.cloud_profiles=mock.settings.cloud_profiles.filter(p=>p.id!==req.params.profile_id);mock.settings.selected_cloud_profile_id="official";mock.settings.api_base=DEFAULT_API;mock.products=normalizeProducts(BASE_PRODUCTS);return reply(true,clone(mock.settings))}
    if(req.command==="toggle_authorization"){const p=mock.products.find(x=>x.id===req.params.product_id);const a=p?.accounts.find(x=>x.id===req.params.account||x.email===req.params.account);if(a){a.authorized=a.authorized==="paused"?"active":"paused";a.connected=a.authorized==="active";a.connection=a.connected?"connected":"disabled"}return reply(true,{ok:true})}
    if(req.command==="remove_authorization"){const p=mock.products.find(x=>x.id===req.params.product_id);if(p)p.accounts=p.accounts.filter(x=>x.id!==req.params.account_id&&x.email!==req.params.account_id);return reply(true,{ok:true})}
    if(req.command==="preview_intent"){
      const base={product_id:"bridge-demo",product_name:"Bridge Demo",cloud_origin:"bridge.chaos-realms.cc",user_display_name:"chaos.realms.ai@gmail.com",user_id:"demo_user",capabilities:["relay.envelope","relay.ack"],local_policy:{version:"BRIDGE-RELAY-AUTH-v1",source_origin:"bridge.chaos-realms.cc",capabilities:["relay.envelope","relay.ack"],product_authorization:{owner:"product-adapter",enforcement:"product-adapter",control:"computer-control"}}};
      return reply(true,base);
    }
    if(req.command==="pick_local_root")return reply(true,{root_id:req.params.root_id,path_display:req.params.path_display,redacted_path:"[local]/"+(req.params.root_id||"chosen")});
    if(req.command==="claim_intent_preview"||req.command==="claim_intent_pending")return reply(true,{pending_id:"pending_demo",status:"pending"});
    if(req.command==="confirm_pending_intent"||req.command==="claim_intent"){mock.products[0].accounts.push({id:"team",email:"team-demo@bridge.example",authorized:"active",connected:true,connection:"connected"});return reply(true,{ok:true})}
    if(req.command==="open_web"||req.command==="start_worker")return reply(true,{ok:true});
    reply(false,null,"unknown command");
  }};
  if(new URLSearchParams(location.search).get("settings"))ui.view="settings";
  if(new URLSearchParams(location.search).get("sheet"))setTimeout(()=>window.PandaBridge.receive({type:"event",event:"deep_link",url:"panda-bridge://connect?intent=demo&api=https://api.bridge.chaos-realms.cc"}),120);
}
if(!window.ipc)installFallback();
refresh().then(status=>{if((status.products||[]).some(p=>(p.accounts||[]).some(a=>a.authorized==="active")))window.PandaBridge.call("start_worker").catch(()=>{})}).catch(()=>render());
