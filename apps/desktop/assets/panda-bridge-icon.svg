<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Panda Bridge Logo</title>
  <desc id="desc">Compact blue Bridge mark with connected relay loops and no white border.</desc>
  <defs>
    <linearGradient id="bridgeBg" x1="164" y1="80" x2="860" y2="944" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b2f68"/>
      <stop offset="0.54" stop-color="#1167e8"/>
      <stop offset="1" stop-color="#061a35"/>
    </linearGradient>
    <linearGradient id="bridgeStroke" x1="180" y1="512" x2="844" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6eeeff"/>
      <stop offset="0.33" stop-color="#338fff"/>
      <stop offset="0.5" stop-color="#7df8ff"/>
      <stop offset="0.67" stop-color="#338fff"/>
      <stop offset="1" stop-color="#75e4ff"/>
    </linearGradient>
    <linearGradient id="nodeFill" x1="276" y1="398" x2="748" y2="626" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d9fbff"/>
