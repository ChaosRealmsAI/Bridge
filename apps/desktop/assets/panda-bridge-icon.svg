<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Blue Infinity Connector Logo</title>
  <desc id="desc">Clean Bridge app icon derived from the company blue infinity connector SVG resource.</desc>
  <defs>
    <linearGradient id="bridgeLoop" x1="72" y1="512" x2="952" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0735b8"/>
