  <g filter="url(#bridgeLift)">
    <path d="M 142 512 C 142 366 246 292 376 292 C 496 292 574 405 512 512 C 450 619 528 732 648 732 C 778 732 882 658 882 512 C 882 366 778 292 648 292 C 528 292 450 405 512 512 C 574 619 496 732 376 732 C 246 732 142 658 142 512 Z" fill="none" stroke="url(#bridgeStroke)" stroke-width="96" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="306" y="466" width="412" height="92" rx="46" fill="url(#bridgeStroke)"/>
    <circle cx="316" cy="512" r="92" fill="#0b2f68" stroke="url(#nodeFill)" stroke-width="38"/>
    <circle cx="708" cy="512" r="92" fill="#0b2f68" stroke="url(#nodeFill)" stroke-width="38"/>
    <circle cx="316" cy="512" r="32" fill="#baf7ff"/>
